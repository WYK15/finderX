name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  msi:
    name: Build MSI
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.6
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Resolve version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tagName = "v${{ inputs.version }}"
            $version = "${{ inputs.version }}"
          } else {
            $tagName = "${{ github.ref_name }}"
            $version = $tagName.TrimStart("v")
          }
          "FINDERX_TAG=$tagName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "FINDERX_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 18 2026" -A x64 "-DFINDERX_VERSION=${{ env.FINDERX_VERSION }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package portable ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\FinderX | Out-Null
          Copy-Item build\Release\FinderX.exe dist\FinderX\FinderX.exe -Force
          Compress-Archive -Path dist\FinderX\* -DestinationPath "dist\FinderX-$env:FINDERX_VERSION-portable.zip" -Force

      - name: Package MSI
        run: cpack --config build/CPackConfig.cmake -C Release -G WIX

      - name: Normalize MSI name
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $msi = Get-ChildItem -Path . -Recurse -Filter "*.msi" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $msi) {
            throw "MSI package was not generated."
          }
          Copy-Item $msi.FullName "dist\FinderX-$env:FINDERX_VERSION-x64.msi" -Force

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinderX-MSI
          path: dist/*.msi

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinderX-Portable
          path: dist/*.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FINDERX_TAG }}
          name: FinderX ${{ env.FINDERX_VERSION }}
          files: |
            dist/*.msi
            dist/*.zip
          generate_release_notes: true
